<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            color: #eef;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        canvas {
            border: 4px solid #2ecc71;
            background: #0b0b0b;
            display: block;
            margin: 0 auto;
        }
        .instructions {
            margin-top: 12px;
            font-size: 14px;
            color: #bbb;
        }
        .title {
            margin-bottom: 12px;
            font-size: 28px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Snake Game</div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div class="instructions">Use arrow keys or WASD to move. Press Space to restart.</div>
        <script src="/snake.js"></script>
    </div>
</body>
</html>
